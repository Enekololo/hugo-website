baseURL = 'https://enekololo.org/'
locale = 'en-us'
title = 'My Everything Website'
theme = 'terminal'
sectionPagesMenu = 'main'
pagination.pagerSize = 5

[markup.highlight]
  noClasses = false

[caches]
  [caches.images]
    dir = ':cacheDir/images'
 [caches.assets]
    dir = ':resourceDir/_gen'
    maxAge = -1
  [caches.getresource]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.misc]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.modulegitinfo]
    dir = ':cacheDir/modules'
    maxAge = '24h'
  [caches.modulequeries]
    dir = ':cacheDir/modules'
    maxAge = '24h'
  [caches.modules]
    dir = ':cacheDir/modules'
    maxAge = -1

[params]
  subtitle = 'The Best Website oat'
  [params.contact]
    email = 'eneko.lasaga@proton.me'
    phone = '0684738407'
  contentTypeName = "posts"
  # if you set this to 0, only submenu trigger will be visible
  showMenuItems = 2
  showLanguageSelector = false
  fullWidthTheme = true
  centerTheme = false
  autoCover = true
  enableGitInfo = true
  showLastUpdated = true

[languages]
  [languages.en]
    languageName = "English"
    title = "Everything Everything"

    [languages.en.params]
      subtitle = "A simple, retro theme for Hugo"
      owner = "Enekololo"
      keywords = ""
      copyright = ""
      menuMore = "Show more"
      readMore = "Read more"
      readOtherPosts = "Read other posts"
      newerPosts = "Newer posts"
      olderPosts = "Older posts"
      missingContentMessage = "Page not found..."
      missingBackButtonLabel = "Back to home page"
      minuteReadingTime = "min read"
      words = "words"

      [languages.en.params.logo]
        logoText = "My Everything Website"
        logoHomeLink = "/"

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10
  [[menus.main]]
    name = 'Projects'
    pageRef = '/posts/links-to-project'
    weight = 20
  [[menus.main]]
    name = 'My Github'
    pre = '<i class="fa fa-heart"></i>'
    url = 'https://github.com/Enekololo'
    weight = 30

    
    
[security]
  enableInlineShortcodes = false
  [security.exec]
    allow = ['^(dart-)?sass(-embedded)?$', '^go$', '^git$', '^node$', '^postcss$', '^tailwindcss$']
    osEnv = ['(?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE|PROGRAMDATA)$']
  [security.funcs]
    getenv = ['^HUGO_', '^CI$']
  [security.http]
    methods = ['(?i)GET|POST']
    urls = ['(?i)^https?://[a-z0-9]', '! ^https?://\d+\.', '! (?i)localhost', '! (?i)^https?://[^/?#]*@']
  [security.node]
    [security.node.permissions]
      allowAddons = ['tailwindcss']
      allowChildProcess = ['tailwindcss']
      allowRead = ['.']
      allowWorker = ['tailwindcss']
      allowWrite = []
      disable = false

